<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="js/theme-init.js"></script>
  <title>Destinations - Premium Travel</title>
  <link rel="stylesheet" href="css/premium-global.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* Destinations Specific Styles */
    .dest-hero {
      position: relative;
      height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 80px 5%;
      overflow: hidden;
      background: var(--bg-main);
    }
    
    .dest-hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.6;
      filter: saturate(1.2);
    }

    .dest-hero-gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80%;
      background: linear-gradient(to top, var(--bg-main) 10%, transparent);
      z-index: 1;
    }

    .dest-hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
    }

    .dest-hero-content h1 {
      font-size: 4rem;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .dest-hero-content p {
      font-size: 1.2rem;
      color: var(--text-secondary);
      max-width: 600px;
    }
    
    /* Filter Bar */
    .premium-filter-bar {
      position: relative;
      z-index: 10;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      margin: -40px 5% 40px 5%;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .search-input-wrap {
      flex: 1;
      min-width: 300px;
      position: relative;
    }
    .search-input-wrap i {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }
    .search-input-wrap input {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--glass-border);
      color: #fff;
      padding: 15px 20px 15px 50px;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s ease;
    }
    .search-input-wrap input:focus {
      border-color: var(--accent-primary);
    }

    .filter-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-tags button {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.3s ease;
    }
    .filter-tags button.active, .filter-tags button:hover {
      background: var(--accent-primary);
      color: var(--bg-main);
      border-color: var(--accent-primary);
      font-weight: 600;
    }

    .sort-select {
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--glass-border);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-family: var(--font-body);
      outline: none;
      cursor: pointer;
    }

    /* Grid Section */
    .results-container {
      padding: 20px 5% 100px 5%;
      position: relative;
      z-index: 2;
    }

    .results-count {
      margin-bottom: 30px;
      font-size: 1.1rem;
      color: var(--text-secondary);
    }
    .results-count strong {
      color: var(--accent-primary);
    }

    .premium-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 40px;
    }
    
    .hidden { display: none !important; }
    
    .no-results {
      text-align: center;
      padding: 100px 20px;
      color: var(--text-secondary);
    }
    .no-results i {
      font-size: 4rem;
      margin-bottom: 20px;
      color: var(--glass-border);
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .premium-modal {
      background: var(--bg-secondary);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      width: 90%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      position: relative;
    }

    .premium-modal-header {
      padding: 20px 30px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(18,18,18,0.9);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .premium-modal-header h3 {
      font-size: 1.5rem;
      color: var(--accent-primary);
      margin: 0;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.3s ease;
    }
    .modal-close:hover { color: #fff; }

    /* The JS will inject premium styled content into modal-body */
    .premium-modal-body {
      padding: 0;
    }
  </style>
</head>
<body>

  <div class="ambient-bg"></div>

  <!-- Glass Navbar -->
  <nav class="glass-nav">
    <a href="home.html" class="nav-logo">
      <i class="fas fa-gem"></i>
      <span>My<strong>Adventure</strong></span>
    </a>
    <div class="nav-right">
      <a href="destinations.html" style="color:var(--accent-primary);font-weight:600;margin-right:20px;">Packages</a>
      <a href="destinations.html?view=hotels" style="margin-right:20px;">Stays</a>
      <a href="planner.html" style="margin-right:20px;">Flights</a>
      <a href="dashboard.html" style="margin-right:20px;">Dashboard</a>
      <a href="login.html" class="nav-role-badge magnetic-btn" style="text-decoration:none;border:1px solid var(--glass-border)">Login</a>
    </div>
  </nav>

  <!-- Premium Hero -->
  <section class="dest-hero page-hero">
    <img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=1600&q=80" alt="Hero" class="dest-hero-bg"/>
    <div class="dest-hero-gradient"></div>
    <div class="dest-hero-content reveal-on-scroll is-visible">
      <h1 id="pageTitle">Curated Packages</h1>
      <p id="pageDesc">Hand-picked luxury itineraries for the discerning traveler.</p>
    </div>
  </section>

  <!-- Filter Bar -->
  <div class="premium-filter-bar reveal-on-scroll filter-section">
    <div class="search-input-wrap">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search experiences, destinations..." oninput="filterDestinations()"/>
    </div>
    <div class="filter-tags" id="hotelFacilityFilter">
      <button class="tag active" onclick="filterByTag(this,'all')">All</button>
      <button class="tag" onclick="filterByTag(this,'budget')">Budget</button>
      <button class="tag" onclick="filterByTag(this,'luxury')">Luxury</button>
      <button class="tag" onclick="filterByTag(this,'adventure')">Adventure</button>
      <button class="tag" onclick="filterByTag(this,'beach')">Beach</button>
      <button class="tag" onclick="filterByTag(this,'cultural')">Cultural</button>
    </div>
    <select id="sortSelect" onchange="filterDestinations()" class="sort-select">
      <option value="default">Sort By</option>
      <option value="price-low">Price: Low to High</option>
      <option value="price-high">Price: High to Low</option>
      <option value="days">Duration</option>
      <option value="name">Name A–Z</option>
    </select>
  </div>

  <!-- Grid Area -->
  <section class="results-container">
    <div class="results-count" id="resultsCount">Showing <strong>0</strong> packages</div>
    <div class="premium-grid" id="destinationsGrid">
      <!-- Populated by JS -->
    </div>
    <div class="no-results hidden" id="noResults">
      <i class="fas fa-gem"></i>
      <p>No experiences match your criteria. Try adjusting your search.</p>
    </div>
  </section>

  <!-- HOTEL MODAL -->
  <div id="hotelModal" class="modal-overlay hidden" onclick="handleHotelModalClick(event)">
    <div class="premium-modal">
      <div class="premium-modal-header">
        <h3 id="hotelModalTitle">Stay Details</h3>
        <button class="modal-close" onclick="closeHotelModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="premium-modal-body" id="hotelModalBody"></div>
    </div>
  </div>

  <!-- PACKAGE MODAL -->
  <div id="pkgModal" class="modal-overlay hidden" onclick="handleModalClick(event)">
    <div class="premium-modal">
      <div class="premium-modal-header">
        <h3 id="pkgModalTitle">Experience Details</h3>
        <button class="modal-close" onclick="closePkgModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="premium-modal-body" id="pkgModalBody"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast" style="position:fixed;bottom:20px;right:20px;background:var(--accent-primary);color:#000;padding:15px 30px;border-radius:12px;font-weight:600;z-index:10000;display:none;"></div>

  <script src="js/storage.js"></script>
  <script src="js/session.js"></script>
  <script src="js/mockdata.js"></script>
  <script src="js/package-itineraries.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/app.js"></script>
  
  <!-- We need to modify destinations.js to output .premium-card structures. -->
  <script src="js/destinations.js"></script>

</body>
</html>
