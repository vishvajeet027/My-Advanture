<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="js/theme-init.js"></script>
  <title>Manage Catalog - MyAdventure</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="home.html" class="logo">
        <i class="fas fa-paper-plane logo-icon"></i>
        <span>My<strong>Adventure</strong></span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="package.html?view=hotels">Hotels</a></li>
        <li><a href="flight.html">Flight</a></li>
        <li><a href="trip-planner.html">Create your own trip</a></li>
      </ul>
      <div class="nav-end">
        <div class="nav-actions">
          <button class="btn-theme" id="themeToggle" title="Toggle theme">
            <i class="fas fa-moon" id="themeIcon"></i>
          </button>
          <a href="login.html" class="btn-login">Login</a>
          <a href="login.html" class="btn-signup">Sign up</a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <main class="admin-page">
    <header class="admin-header">
      <div>
        <p class="admin-eyebrow">Admin only</p>
        <h1>Manage Catalog</h1>
        <p class="admin-sub">Add, edit, or remove hotels, places, vehicles, and flights used across the app.</p>
      </div>
      <button type="button" class="btn-primary" id="adminAddBtn" onclick="openCatalogForm()">
        <i class="fas fa-plus"></i> Add Item
      </button>
    </header>

    <div class="admin-tabs" role="tablist">
      <button type="button" class="admin-tab active" data-tab="hotels" onclick="switchCatalogTab('hotels')">
        <i class="fas fa-hotel"></i> Hotels <span id="count-hotels">0</span>
      </button>
      <button type="button" class="admin-tab" data-tab="places" onclick="switchCatalogTab('places')">
        <i class="fas fa-map-marker-alt"></i> Places <span id="count-places">0</span>
      </button>
      <button type="button" class="admin-tab" data-tab="rentals" onclick="switchCatalogTab('rentals')">
        <i class="fas fa-car"></i> Vehicles <span id="count-rentals">0</span>
      </button>
      <button type="button" class="admin-tab" data-tab="flights" onclick="switchCatalogTab('flights')">
        <i class="fas fa-plane"></i> Flights <span id="count-flights">0</span>
      </button>
    </div>

    <div class="admin-toolbar">
      <input type="search" id="adminSearch" placeholder="Search catalog…" oninput="renderCatalogList()" />
      <button type="button" class="btn-outline" onclick="reseedCatalog()">
        <i class="fas fa-seedling"></i> Reset catalog to defaults
      </button>
    </div>

    <div class="admin-list" id="adminList"></div>
  </main>

  <!-- Form modal -->
  <div class="modal-overlay hidden" id="adminModal" role="dialog" aria-modal="true"
    onclick="handleAdminModalClick(event)">
    <div class="modal admin-form-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="adminModalTitle">Add item</h3>
        <button type="button" class="modal-close" onclick="closeCatalogForm()" aria-label="Close">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <form id="adminForm" onsubmit="submitCatalogForm(event)">
          <div id="adminFormFields" class="admin-form-grid"></div>
          <div class="modal-footer-actions">
            <button type="button" class="btn-outline" onclick="closeCatalogForm()">Cancel</button>
            <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Delete / Reset confirm modal -->
  <div class="modal-overlay hidden" id="adminDeleteModal" role="dialog" aria-modal="true"
    onclick="handleAdminDeleteModalClick(event)">
    <div class="modal delete-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="adminDeleteTitle">Delete Item?</h3>
        <button type="button" class="modal-close" onclick="closeAdminDeleteModal()" aria-label="Close">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body delete-modal-body">
        <div class="delete-modal-icon" aria-hidden="true">
          <i class="fas fa-trash-alt" id="adminDeleteIcon"></i>
        </div>
        <p class="delete-modal-message" id="adminDeleteMessage">
          This action cannot be undone.
        </p>
        <div class="delete-trip-preview" id="adminDeletePreview">
          <div class="delete-trip-preview-icon"><i class="fas fa-hotel" id="adminDeletePreviewIcon"></i></div>
          <div>
            <strong id="adminDeleteName">Item name</strong>
            <span id="adminDeleteSub">Catalog item</span>
          </div>
        </div>
        <div class="delete-modal-actions">
          <button type="button" class="btn-delete-cancel" onclick="closeAdminDeleteModal()">
            <i class="fas fa-arrow-left"></i> Keep It
          </button>
          <button type="button" class="btn-delete-confirm" id="adminDeleteConfirmBtn" onclick="confirmAdminDelete()">
            <i class="fas fa-trash"></i> Yes, Delete
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/storage.js"></script>
  <script src="js/session.js"></script>
  <script src="js/mockdata.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>

</html>
