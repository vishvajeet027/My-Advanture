<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waterpark Ticket</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e0f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .ticket {
            display: flex;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 151, 167, 0.2);
            overflow: hidden;
            width: 700px;
            max-width: 90%;
            position: relative;
        }

        /* Create the perforated tear effect */
        .ticket::before,
        .ticket::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #e0f7fa;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }

        .ticket::before {
            left: -20px;
        }

        .ticket::after {
            right: 210px;
            /* Positioned at the seam */
        }

        .ticket-left {
            padding: 40px;
            flex: 1;
            background: linear-gradient(135deg, #00bcd4, #0288d1);
            color: white;
            border-right: 2px dashed rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
        }

        .watermark {
            position: absolute;
            top: -30px;
            right: -20px;
            font-size: 180px;
            color: rgba(255, 255, 255, 0.1);
            z-index: 0;
            transform: rotate(-15deg);
            user-select: none;
        }

        .ticket-left-content {
            position: relative;
            z-index: 1;
        }

        .park-name {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .ticket-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 20px 0;
            line-height: 1.2;
        }

        .ticket-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 10px;
        }

        .info-group {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .ticket-right {
            width: 230px;
            padding: 40px 20px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .ticket-type {
            color: #0288d1;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .barcode {
            width: 100%;
            height: 60px;
            /* Simple CSS barcode effect */
            background: repeating-linear-gradient(to right,
                    #333,
                    #333 4px,
                    white 4px,
                    white 6px,
                    #333 6px,
                    #333 12px,
                    white 12px,
                    white 14px,
                    #333 14px,
                    #333 18px,
                    white 18px,
                    white 22px);
            margin-bottom: 10px;
        }

        .ticket-number {
            font-family: monospace;
            font-size: 0.9rem;
            color: #666;
            letter-spacing: 2px;
        }

        .price {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: 800;
            color: #333;
        }

        @media (max-width: 600px) {
            .ticket {
                flex-direction: column;
                width: 320px;
            }

            .ticket::after {
                top: auto;
                bottom: 210px;
                right: 50%;
                transform: translateX(50%);
            }

            .ticket-left {
                border-right: none;
                border-bottom: 2px dashed rgba(255, 255, 255, 0.5);
            }

            .ticket-right {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>

<body>

    <div class="ticket">
        <div class="ticket-left">
            <div class="watermark">🌊</div>
            <div class="ticket-left-content">
                <div class="park-name">AquaSplash Waterpark</div>
                <h1 class="ticket-title">Summer<br>Admission</h1>

                <div class="ticket-info">
                    <div class="info-group">
                        <span class="info-label">Date</span>
                        <span class="info-value">July 20, 2026</span>
                    </div>
                    <div class="info-group">
                        <span class="info-label">Time</span>
                        <span class="info-value">09:00 AM - 06:00 PM</span>
                    </div>
                    <div class="info-group">
                        <span class="info-label">Guest</span>
                        <span class="info-value">1 Adult</span>
                    </div>
                    <div class="info-group">
                        <span class="info-label">Gate</span>
                        <span class="info-value">Main Entrance</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="ticket-right">
            <div class="ticket-type">VIP Pass</div>
            <div class="barcode"></div>
            <div class="ticket-number">#AQS-9823-456</div>
            <div class="price">Rs. 450.00</div>
        </div>
    </div>

</body>

</html>
